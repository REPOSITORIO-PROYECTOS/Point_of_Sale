<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Comprobante de Egreso</title>
  <style>
    @page { margin: 0; size: 80mm auto; }
    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 10px;
      margin: 0;
      padding: 0;
      color: #000;
    }
    .ticket {
      width: 100%;
      max-width: 80mm;
      padding: 2mm;
      box-sizing: border-box;
      margin: 0 auto;
    }
    @media print {
      .ticket { width: 76mm; padding: 2mm; }
    }
    .header { text-align: center; }
    .header h1 { margin: 4px 0; font-size: 13px; }
    .row { display: flex; justify-content: space-between; margin: 2px 0; }
    .total { font-weight: bold; font-size: 12px; margin-top: 6px; }
    hr { border: none; border-top: 1px dashed #000; margin: 6px 0; }
    .footer { text-align: center; font-size: 9px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="ticket">
    <div class="header">
      <h1>Cafetería Demo</h1>
      <p><strong>COMPROBANTE DE EGRESO</strong></p>
    </div>
    <hr>
    <div class="row"><span>Fecha:</span><span>24/06/2026, 02:30 p. m.</span></div>
    <div class="row"><span>Operador:</span><span>María García</span></div>
    <div class="row"><span>Método:</span><span>Efectivo</span></div>
    <div class="row"><span>Concepto:</span><span>Compra insumos limpieza</span></div>
    <hr>
    <div class="row total"><span>MONTO EGRESO:</span><span>$4500.00</span></div>
    <hr>
    <p class="footer">Mov. #88 · Sesión 12</p>
    <p class="footer">Documento no válido como factura</p>
  </div>
</body>
</html>
