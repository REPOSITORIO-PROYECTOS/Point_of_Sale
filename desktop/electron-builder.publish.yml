# Fragmento compartido: publicación en GitHub Releases (electron-updater).
# Owner: github.com/REPOSITORIO-PROYECTOS/Point_of_Sale (repo público desde 2026-06).
# Cajas: POS_UPDATER_PUBLIC_REPO=true en %APPDATA%\PointOfSale\updater.env (sin PAT).
# Repo privado: GH_UPDATER_TOKEN en updater.env o POS_DISABLE_AUTO_UPDATE=true.
publish:
  - provider: github
    owner: REPOSITORIO-PROYECTOS
    repo: Point_of_Sale
    releaseType: release
