# Instalador NSIS con AFIP embebido.
extends:
  - ./electron-builder.publish.yml
  - ./electron-builder.common.yml
appId: com.pointofsale.desktop
productName: Point of Sale
directories:
  output: release
  buildResources: resources
forceCodeSigning: false
compression: maximum
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: resources/nodejs/node.exe
    to: nodejs/node.exe
  - from: ../backend/.pack-staging/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: ../backend/.pack-staging/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: ../backend/.pack-staging/package.json
    to: backend/package.json
  - from: ../frontend/dist
    to: frontend
    filter:
      - "**/*"
  - from: ../services/afip/dist/afip-service.exe
    to: afip/afip-service.exe
win:
  icon: resources/icon.ico
  signAndEditExecutable: false
  target:
    - nsis
  artifactName: Point-of-Sale-Setup.${ext}
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: Point of Sale
