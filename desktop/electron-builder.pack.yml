# Config para empaquetado de release: usa backend/.pack-staging (solo prod deps).
extends: ./electron-builder.common.yml
appId: com.pointofsale.desktop
productName: Point of Sale
directories:
  output: release
  buildResources: resources
forceCodeSigning: false
files:
  - dist/**/*
  - package.json
  - "!node_modules/**"
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: ../backend/.pack-staging/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: ../backend/.pack-staging/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: ../backend/.pack-staging/package.json
    to: backend/package.json
  - from: ../frontend/dist
    to: frontend
    filter:
      - "**/*"
win:
  icon: resources/icon.ico
  signAndEditExecutable: false
  target:
    - dir
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
