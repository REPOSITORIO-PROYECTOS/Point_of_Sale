# Instalador NSIS (un clic). Usa backend/.pack-staging (solo deps de producción).
extends:
  - ./electron-builder.publish.yml
  - ./electron-builder.common.yml
appId: com.pointofsale.desktop
productName: Point of Sale
directories:
  output: release
  buildResources: resources
forceCodeSigning: false
files:
  - dist/**/*
  - package.json
  - "!node_modules/**"
extraResources:
  - from: resources/icon.png
    to: icon.png
  - from: resources/icon.ico
    to: icon.ico
  - from: ../backend/.pack-staging/dist
    to: backend/dist
    filter:
      - "**/*"
  - from: ../backend/.pack-staging/node_modules
    to: backend/node_modules
    filter:
      - "**/*"
  - from: ../backend/.pack-staging/package.json
    to: backend/package.json
  - from: ../frontend/dist
    to: frontend
    filter:
      - "**/*"
win:
  icon: resources/icon.ico
  signAndEditExecutable: false
  target:
    - nsis
  artifactName: ${productName}-${version}-${os}-${arch}.${ext}
nsis:
  oneClick: true
  perMachine: false
  allowToChangeInstallationDirectory: false
  compression: maximum
  createDesktopShortcut: true
  createStartMenuShortcut: true
  runAfterFinish: true
  shortcutName: Point of Sale
