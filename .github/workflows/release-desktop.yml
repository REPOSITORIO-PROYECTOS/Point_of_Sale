name: Release Desktop

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      variant:
        description: 'Variante del instalador'
        required: true
        default: standard
        type: choice
        options:
          - standard
          - fiscal

permissions:
  contents: write

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install license public key
        shell: pwsh
        env:
          LICENSE_PUBLIC_KEY_PEM: ${{ secrets.LICENSE_PUBLIC_KEY_PEM }}
        run: |
          if (-not $env:LICENSE_PUBLIC_KEY_PEM) {
            throw 'Falta el secret LICENSE_PUBLIC_KEY_PEM en el repo (clave publica de licencia).'
          }
          $dir = 'backend/src/license/keys'
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          Set-Content -Path (Join-Path $dir 'license-public.pem') -Value $env:LICENSE_PUBLIC_KEY_PEM -NoNewline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json
            backend/package-lock.json
            desktop/package-lock.json

      - name: Install dependencies
        shell: pwsh
        env:
          NODE_ENV: development
        run: |
          $ErrorActionPreference = 'Stop'
          npm ci
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm ci --prefix frontend
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm ci --prefix backend
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          npm ci --prefix desktop
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Set version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^refs/tags/') { $tag = $tag -replace '^refs/tags/', '' }
          if ($tag -match '^v') { $tag = $tag.Substring(1) }
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = (Get-Content package.json | ConvertFrom-Json).version
          }
          node scripts/set-version.mjs $tag

      - name: Build stack
        shell: pwsh
        run: |
          npm run build:api
          npm run build --prefix desktop
        working-directory: ${{ github.workspace }}
      - name: Build frontend (electron)
        shell: pwsh
        working-directory: frontend
        run: npm run build:electron

      - name: Prepare backend pack (Electron as Node, sin node.exe embebido)
        shell: pwsh
        run: ./scripts/prepare-backend-pack.ps1 -Force

      - name: Ensure GitHub release exists (evita carrera al publicar assets)
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -match '^refs/tags/') { $tag = $tag -replace '^refs/tags/', '' }
          $version = $tag -replace '^v', ''
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --draft --title $version --notes "Publicando instalador desde CI..."
          }

      - name: Build AFIP sidecar (fiscal)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.variant == 'fiscal'
        shell: pwsh
        run: npm run build:afip-sidecar

      - name: Publish standard installer
        if: github.event_name == 'push' || github.event.inputs.variant == 'standard'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:win:publish --prefix desktop

      - name: Publish fiscal installer
        if: github.event.inputs.variant == 'fiscal'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:win:fiscal:publish --prefix desktop
