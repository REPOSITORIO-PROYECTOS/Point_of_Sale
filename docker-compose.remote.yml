# Relay remoto (MVP) — desplegar en VPS con TLS delante (Caddy/nginx).
# Portal PWA: build estático aparte (Vercel/Cloudflare Pages/nginx).
#
# Uso:
#   cp services/remote/.env.example services/remote/.env
#   # editar DEV_PORTAL_* y CORS_ORIGINS
#   docker compose -f docker-compose.remote.yml up -d --build

services:
  remote-relay:
    build:
      context: ./services/remote
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5090:5090"
    env_file:
      - path: ./services/remote/.env
        required: false
    environment:
      NODE_ENV: production
      PORT: 5090
      HOST: 0.0.0.0
      SEED_DEMO: "false"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5090/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
