services:
  afip:
    build:
      context: ./services/afip
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:5086:8002"
    env_file:
      - path: ./services/afip/.env
        required: false
    environment:
      PRODUCTION: "FALSE"
      INSTANCE_PORT: "5086"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8002/api/afipws/test',timeout=5); sys.exit(0 if r.getcode()==200 else 1)\" || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  pos-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      HOST: 0.0.0.0
      PORT: 3001
      NODE_ENV: development
      CORS_ORIGIN: http://localhost:5173
      ENABLE_SWAGGER: "true"
      AFIP_SERVICE_URL: http://afip:8002
      AFIP_PUNTO_VENTA: "1"
      AFIP_PRODUCTION: "false"
    volumes:
      - pos-api-storage:/app/storage
    depends_on:
      afip:
        condition: service_started
    restart: unless-stopped

volumes:
  pos-api-storage:
